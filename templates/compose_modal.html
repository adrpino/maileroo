<div id="maileroo-modal" class="maileroo-modal-backdrop" hx-on:click="if(event.target == this) this.remove()">
    <style>
        .maileroo-compose-modal {
            max-width: 700px;
            width: 95%;
            background: white;
            border-radius: 12px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: modalFadeIn 0.2s ease-out;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .maileroo-compose-header {
            padding: 16px 24px;
            background: #f8fafc;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .maileroo-compose-header h3 {
            margin: 0;
            font-size: 1.1rem;
            color: #1a202c;
            font-weight: 700;
        }

        .maileroo-compose-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .form-row {
            display: grid;
            grid-template-columns: 100px 1fr;
            align-items: center;
            gap: 16px;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 8px;
            }
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .compose-input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #1e293b;
            transition: all 0.2s;
            box-sizing: border-box; /* Crucial for width: 100% */
        }

        .compose-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .compose-textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.95rem;
            color: #1e293b;
            resize: vertical;
            min-height: 300px;
            font-family: inherit;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .compose-textarea:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .maileroo-compose-footer {
            padding: 16px 24px;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .draft-status {
            font-size: 0.8rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 1.2rem;
        }

        .htmx-indicator {
            display: none;
        }
        .htmx-request .htmx-indicator {
            display: inline;
        }
        .htmx-request.htmx-indicator {
            display: inline;
        }

        .draft-saving::after {
            content: '...';
            display: inline-block;
            width: 12px;
            text-align: left;
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }

        .btn-send {
            background: #2563eb;
            color: white;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-send:hover {
            background: #1d4ed8;
        }

        .btn-send:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #1d4ed8 !important;
        }

        .btn-send .indicator-loading {
            display: none;
        }

        .btn-send.htmx-request .indicator-default {
            display: none !important;
        }

        .btn-send.htmx-request .indicator-loading {
            display: inline-flex !important;
            align-items: center;
            gap: 8px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .btn-cancel {
            background: transparent;
            color: #64748b;
            padding: 10px 16px;
            border-radius: 8px;
            font-weight: 600;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            background: #f1f5f9;
            color: #1e293b;
        }
    </style>

    <div class="maileroo-compose-modal" hx-on:click="event.stopPropagation()">
        <div class="maileroo-compose-header">
            <h3>{{ locale.compose_button() }}</h3>
            <button class="maileroo-modal-close" hx-on:click="document.getElementById('maileroo-modal').remove()" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        
        <form hx-post="/api/v1/emails/drafts" 
              hx-trigger="input changed delay:2s, change changed delay:2s" 
              hx-target="#draft-status-container" 
              hx-swap="innerHTML"
              hx-indicator="#draft-indicator">
            
            <div class="maileroo-compose-body">
                <div id="draft-id-container">
                    {% if let Some(id) = draft_id %}
                        <input type="hidden" name="draft_id" value="{{ id }}">
                    {% endif %}
                </div>
                <div class="form-row">
                    <label for="from_alias_id" class="form-label">{{ locale.compose_from() }}</label>
                    <select id="from_alias_id" name="from_alias_id" class="compose-input">
                        {% for alias in aliases %}
                            <option value="{{ alias.id }}" 
                                {% match selected_alias_id %}
                                    {% when Some with (sid) %}
                                        {% if sid == &alias.id %}selected{% endif %}
                                    {% when None %}
                                {% endmatch %}>
                                {{ alias.subdomain }}@{{ alias.domain_name }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-row">
                    <label for="to_email" class="form-label">{{ locale.compose_to() }}</label>
                    <input type="email" id="to_email" name="to_email" class="compose-input" placeholder="recipient@example.com" value="{{ to_email }}">
                </div>

                <div class="form-row">
                    <label for="subject" class="form-label">{{ locale.compose_subject() }}</label>
                    <input type="text" id="subject" name="subject" class="compose-input" placeholder="Enter subject" value="{{ subject }}">
                </div>

                <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 10px;">
                    <label for="body_text" class="form-label">{{ locale.compose_body() }}</label>
                    <textarea id="body_text" name="body_text" class="compose-textarea" placeholder="Write your message here...">{{ body_text }}</textarea>
                </div>
            </div>

            <div class="maileroo-compose-footer">
                <div id="draft-status-container" class="draft-status">
                    <span id="draft-indicator" class="htmx-indicator draft-saving">Saving</span>
                    <span id="draft-status-text"></span>
                </div>
                
                <div style="display: flex; gap: 12px; align-items: center;">
                    <button type="button" class="btn-cancel" hx-on:click="document.getElementById('maileroo-modal').remove()">{{ locale.modal_cancel() }}</button>
                    <button type="button" class="btn-send" hx-post="/api/v1/emails/send" hx-disabled-elt="this" hx-target="body" hx-swap="beforeend" hx-on::after-request="if(event.detail.successful) document.getElementById('maileroo-modal').remove()">
                        <span class="indicator-default" style="display: inline-flex; align-items: center; gap: 8px;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            {{ locale.compose_send() }}
                        </span>
                        <span class="indicator-loading" style="display: none; align-items: center; gap: 8px;">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>
                            {{ locale.compose_sending() }}
                        </span>
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
