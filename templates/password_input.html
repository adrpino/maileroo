<div id="password-wrapper" style="display: flex; gap: 5px; align-items: center;">
    <input type="{% if show %}text{% else %}password{% endif %}" 
           name="password" 
           value="{{ value }}" 
           {% if let Some(ml) = minlength %}minlength="{{ ml }}"{% endif %}
           {% if let Some(ph) = placeholder %}placeholder="{{ ph }}"{% endif %}
           {% if let Some(ac) = autocomplete %}autocomplete="{{ ac }}"{% endif %}
           style="flex-grow: 1;"
           required>
    <input type="hidden" name="minlength" value="{{ minlength.clone().unwrap_or_default() }}">
    <input type="hidden" name="placeholder" value="{{ placeholder.clone().unwrap_or_default() }}">
    <input type="hidden" name="autocomplete" value="{{ autocomplete.clone().unwrap_or_default() }}">
    <input type="hidden" name="show" value="{{ !show }}">
    <button type="button" 
            hx-post="/auth/password-toggle" 
            hx-target="#password-wrapper" 
            hx-swap="outerHTML"
            hx-include="[name='password'], [name='minlength'], [name='placeholder'], [name='autocomplete'], [name='show']"
            style="padding: 8px; background: #eee; color: #333; border: 1px solid #ccc; width: 40px; display: flex; align-items: center; justify-content: center;">
        {% if show %}
            {# Eye Slash Icon (Simplified) #}
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
        {% else %}
            {# Eye Icon (Simplified) #}
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        {% endif %}
    </button>
</div>
